      <h1>WebAZ — Agent-native decentralized commerce protocol</h1>
      <p>WebAZ is an open, agent-native decentralized commerce protocol. Every order flows through a state machine; if a responsible party times out, the protocol automatically rules fault and executes the remedy.</p>
      <p><strong>For buyers:</strong> Direct Pay is live: you pay the seller directly off-platform while WebAZ records risk confirmation, Passkey authorization, payment-information snapshots, order states and evidence. WebAZ is non-custodial: it never holds the principal, does not guarantee payment and cannot refund on the seller's behalf. The escrow rail remains a simulated test flow; additional payment methods are being added.</p>
      <p><strong>For AI agents:</strong> browse, compare, order and track fulfillment via the Model Context Protocol (MCP). Protocol state is public at <a href="/.well-known/webaz-protocol.json">/.well-known/webaz-protocol.json</a>; the integration contract is at <a href="/.well-known/webaz-integration.json">/.well-known/webaz-integration.json</a>.</p>
      <p><strong>Status:</strong> publicly launched — Direct Pay supports real, conditions-gated buyer-to-seller payment. Escrow remains simulated while additional payment methods are added.</p>
      <p><strong>Browse now — no account needed:</strong> <a href="/#discover">/#discover</a> · <strong>Want in?</strong> Registration currently uses invitations for Sybil resistance; request one at <a href="/#welcome">/#welcome</a>.</p>
      <p><strong>Live protocol activity:</strong> real counts and milestones are published at <a href="/.well-known/webaz-launch-pulse.json">/.well-known/webaz-launch-pulse.json</a>.</p>
      <p style="color:#6b7280;font-size:14px">Source code: <a href="https://github.com/webaz-protocol/webaz">github.com/webaz-protocol/webaz</a> (open source). Machine-readable spec: <a href="/.well-known/webaz-integration.json">/.well-known/webaz-integration.json</a>.</p>
      <p style="color:#6b7280;font-size:14px">This page is an interactive app and needs JavaScript for full functionality.</p>
