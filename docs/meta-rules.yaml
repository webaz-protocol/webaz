    name_zh: "信仰层"
    name_en: "Faith Layer"
    rules: [1, 2]
  - id: red_lines
    name_zh: "红线层"
    name_en: "Red Lines"
    rules: [3, 4, 5, 6, 7]
  - id: operations
    name_zh: "操作层"
    name_en: "Operations"
    rules: [8, 9]
  - id: identity
    name_zh: "身份层"
    name_en: "Identity"
    rules: [10]

