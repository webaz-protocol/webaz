# Foundry config — MerchantBondVault v1 (testnet/dev only; mainnet gated by design §9).
# Solidity-only build; isolated from the Node/TS app (src=contracts).
[profile.default]
src = "contracts"
test = "contracts/test"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
# Deterministic, security-leaning defaults.
bytecode_hash = "none"
cbor_metadata = false

[fmt]
line_length = 120
tab_width = 4
